services:
  - type: web
    name: flask-todo
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: flask-todo-db
          property: connectionString

databases:
  - name: flask-todo-db
    plan: free
